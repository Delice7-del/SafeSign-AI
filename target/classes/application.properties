# SafeSign / ClauseGuard API — base configuration
# Secrets: set GROQ_API_KEY env var or create application-local.properties (see SETUP.md)

spring.application.name=clauseguard-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.config.import=optional:classpath:application-local.properties,optional:file:./application-local.properties

# Groq + Python AI bridge
groq.api.key=${GROQ_API_KEY:}
python.executable=${PYTHON_EXECUTABLE:python}

server.port=${SERVER_PORT:8080}
